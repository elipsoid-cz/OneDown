name: OneDown
options:
  bundleIdPrefix: io.github.onedown-app
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ALWAYS_SEARCH_USER_PATHS: NO
    CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES

configs:
  Debug: debug
  Release: release

targets:
  OneDown:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: OneDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.onedown-app.OneDown
        CODE_SIGN_ENTITLEMENTS: OneDown/OneDown.entitlements
        INFOPLIST_FILE: OneDown/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - target: OneDownExtension
        embed: true

  OneDownExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: OneDownExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.onedown-app.OneDown.Extension
        CODE_SIGN_ENTITLEMENTS: OneDownExtension/OneDownExtension.entitlements
        INFOPLIST_FILE: OneDownExtension/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES

schemes:
  OneDown:
    build:
      targets:
        OneDown: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

  OneDownExtension:
    build:
      targets:
        OneDownExtension: all
    run:
      config: Debug
      askForAppToLaunch: true
